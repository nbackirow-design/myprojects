<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="breadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="50%" style="stop-color:#C49159"/>
      <stop offset="100%" style="stop-color:#A67C40"/>
    </linearGradient>
    <linearGradient id="crustGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47"/>
      <stop offset="100%" style="stop-color:#6B5437"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDFBF7"/>
      <stop offset="100%" style="stop-color:#F5EFE3"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>

  <!-- Decorative wheat elements -->
  <g opacity="0.1">
    <path d="M50 250 Q70 200 60 150 Q55 120 70 100" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <ellipse cx="65" cy="110" rx="8" ry="15" fill="#C9A84C" transform="rotate(-20 65 110)"/>
    <ellipse cx="62" cy="130" rx="7" ry="14" fill="#C9A84C" transform="rotate(-30 62 130)"/>
    <ellipse cx="58" cy="150" rx="6" ry="13" fill="#C9A84C" transform="rotate(-40 58 150)"/>

    <path d="M350 250 Q330 200 340 150 Q345 120 330 100" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <ellipse cx="335" cy="110" rx="8" ry="15" fill="#C9A84C" transform="rotate(20 335 110)"/>
    <ellipse cx="338" cy="130" rx="7" ry="14" fill="#C9A84C" transform="rotate(30 338 130)"/>
    <ellipse cx="342" cy="150" rx="6" ry="13" fill="#C9A84C" transform="rotate(40 342 150)"/>
  </g>

  <!-- Bread loaf -->
  <g transform="translate(200, 180)" filter="url(#shadow)">
    <!-- Bottom crust -->
    <ellipse cx="0" cy="60" rx="120" ry="35" fill="url(#crustGrad)"/>

    <!-- Bread body -->
    <path d="M-110 -40
             Q-110 -70 -90 -85
             Q-60 -100 0 -100
             Q60 -100 90 -85
             Q110 -70 110 -40
             L110 60
             Q110 70 100 75
             Q60 95 0 95
             Q-60 95 -100 75
             Q-110 70 -110 60 Z"
          fill="url(#breadGrad)"/>

    <!-- Top crust -->
    <ellipse cx="0" cy="-70" rx="100" ry="30" fill="#8B6F47"/>

    <!-- Texture lines -->
    <path d="M-80 0 Q-60 5 -40 0 Q-20 -5 0 0 Q20 5 40 0 Q60 -5 80 0"
          stroke="#8B6F47" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M-75 25 Q-55 30 -35 25 Q-15 20 5 25 Q25 30 45 25 Q65 20 85 25"
          stroke="#8B6F47" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M-70 -20 Q-50 -15 -30 -20 Q-10 -25 10 -20 Q30 -15 50 -20 Q70 -25 90 -20"
          stroke="#8B6F47" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Slice indicator -->
    <ellipse cx="0" cy="-70" rx="80" ry="22" fill="none" stroke="#A67C40" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Wheat stalk decoration -->
  <g transform="translate(280, 50)">
    <path d="M0 60 Q10 40 5 20 Q0 10 10 0" stroke="#C9A84C" stroke-width="2.5" fill="none"/>
    <ellipse cx="8" cy="10" rx="6" ry="12" fill="#D4A574" transform="rotate(-25 8 10)"/>
    <ellipse cx="5" cy="25" rx="5" ry="11" fill="#D4A574" transform="rotate(-35 5 25)"/>
    <ellipse cx="10" cy="40" rx="5" ry="10" fill="#D4A574" transform="rotate(-45 10 40)"/>
  </g>

  <!-- Label badge -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#C9A84C" filter="url(#shadow)"/>
    <text x="70" y="22" text-anchor="middle" fill="#FFF" font-family="Georgia, serif" font-size="16" font-weight="bold">Хлеб</text>
    <text x="70" y="40" text-anchor="middle" fill="#FFF" font-family="Georgia, serif" font-size="11">ЗДОРОВЬЕ</text>
  </g>
</svg>
