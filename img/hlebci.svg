<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C585"/>
      <stop offset="50%" style="stop-color:#D4B070"/>
      <stop offset="100%" style="stop-color:#B89550"/>
    </linearGradient>
    <linearGradient id="garlicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F4E8"/>
      <stop offset="100%" style="stop-color:#E8E0D0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDFBF7"/>
      <stop offset="100%" style="stop-color:#F5EFE3"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>

  <!-- Decorative wheat background -->
  <g opacity="0.12">
    <path d="M30 280 Q50 220 40 160 Q35 120 50 90" stroke="#C9A84C" stroke-width="2.5" fill="none"/>
    <ellipse cx="45" cy="100" rx="7" ry="14" fill="#C9A84C" transform="rotate(-25 45 100)"/>
    <ellipse cx="40" cy="130" rx="6" ry="12" fill="#C9A84C" transform="rotate(-35 40 130)"/>
    <ellipse cx="35" cy="160" rx="5" ry="11" fill="#C9A84C" transform="rotate(-45 35 160)"/>

    <path d="M370 280 Q350 220 360 160 Q365 120 350 90" stroke="#C9A84C" stroke-width="2.5" fill="none"/>
    <ellipse cx="355" cy="100" rx="7" ry="14" fill="#C9A84C" transform="rotate(25 355 100)"/>
    <ellipse cx="360" cy="130" rx="6" ry="12" fill="#C9A84C" transform="rotate(35 360 130)"/>
    <ellipse cx="365" cy="160" rx="5" ry="11" fill="#C9A84C" transform="rotate(45 365 160)"/>
  </g>

  <!-- Stack of snack breads -->
  <g transform="translate(200, 150)">
    <!-- Bottom slices -->
    <g filter="url(#shadow)">
      <rect x="-80" y="40" width="70" height="50" rx="6" fill="url(#snackGrad)" transform="rotate(-20 -45 65)"/>
      <rect x="-77" y="43" width="64" height="44" rx="5" fill="none" stroke="#A67C40" stroke-width="0.5" opacity="0.4" transform="rotate(-20 -45 65)"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="-30" y="45" width="72" height="52" rx="6" fill="url(#snackGrad)" transform="rotate(10 -5 71)"/>
      <rect x="-27" y="48" width="66" height="46" rx="5" fill="none" stroke="#A67C40" stroke-width="0.5" opacity="0.4" transform="rotate(10 -5 71)"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="35" y="42" width="68" height="48" rx="6" fill="url(#snackGrad)" transform="rotate(25 69 66)"/>
      <rect x="38" y="45" width="62" height="42" rx="5" fill="none" stroke="#A67C40" stroke-width="0.5" opacity="0.4" transform="rotate(25 69 66)"/>
    </g>

    <!-- Middle layer -->
    <g filter="url(#shadow)">
      <rect x="-55" y="10" width="65" height="48" rx="6" fill="url(#snackGrad)" transform="rotate(-10 -22 34)"/>
      <rect x="-52" y="13" width="59" height="42" rx="5" fill="none" stroke="#A67C40" stroke-width="0.5" opacity="0.4" transform="rotate(-10 -22 34)"/>
      <!-- Grain texture -->
      <circle cx="-40" cy="25" r="1.5" fill="#8B6F47" opacity="0.5"/>
      <circle cx="-25" cy="35" r="1.5" fill="#8B6F47" opacity="0.5"/>
      <circle cx="-35" cy="40" r="1" fill="#8B6F47" opacity="0.5"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="15" y="15" width="68" height="50" rx="6" fill="url(#snackGrad)" transform="rotate(5 49 40)"/>
      <rect x="18" y="18" width="62" height="44" rx="5" fill="none" stroke="#A67C40" stroke-width="0.5" opacity="0.4" transform="rotate(5 49 40)"/>
    </g>

    <!-- Top slice - main -->
    <g transform="translate(-10, -15)" filter="url(#shadow)">
      <rect x="-30" y="0" width="75" height="55" rx="7" fill="url(#snackGrad)"/>
      <rect x="-26" y="4" width="67" height="47" rx="6" fill="none" stroke="#A67C40" stroke-width="0.5" opacity="0.5"/>

      <!-- Grain texture pattern -->
      <circle cx="-15" cy="15" r="1.5" fill="#8B6F47" opacity="0.4"/>
      <circle cx="5" cy="20" r="1.5" fill="#8B6F47" opacity="0.4"/>
      <circle cx="-8" cy="32" r="1" fill="#8B6F47" opacity="0.4"/>
      <circle cx="12" cy="38" r="1.5" fill="#8B6F47" opacity="0.4"/>
      <circle cx="20" cy="12" r="1" fill="#8B6F47" opacity="0.4"/>

      <!-- Garlic/seasoning pieces -->
      <ellipse cx="-18" cy="25" rx="4" ry="3" fill="url(#garlicGrad)" opacity="0.8"/>
      <ellipse cx="8" cy="30" rx="3" ry="2.5" fill="url(#garlicGrad)" opacity="0.8"/>
      <ellipse cx="15" cy="18" rx="3.5" ry="2" fill="url(#garlicGrad)" opacity="0.8"/>
    </g>

    <!-- Side pieces -->
    <g transform="translate(-85, 25) rotate(-35)" filter="url(#shadow)">
      <rect x="0" y="0" width="55" height="40" rx="5" fill="#D4B070"/>
    </g>

    <g transform="translate(95, 30) rotate(40)" filter="url(#shadow)">
      <rect x="0" y="0" width="52" height="38" rx="5" fill="#D4B070"/>
    </g>
  </g>

  <!-- Label badge -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#C9A84C" filter="url(#shadow)"/>
    <text x="90" y="22" text-anchor="middle" fill="#FFF" font-family="Georgia, serif" font-size="16" font-weight="bold">Хлебцы</text>
    <text x="90" y="40" text-anchor="middle" fill="#FFF" font-family="Georgia, serif" font-size="11">SNACK ЗДОРОВЬЕ</text>
  </g>

  <!-- NEW badge -->
  <g transform="translate(250, 45)">
    <circle cx="0" cy="0" r="35" fill="#27AE60" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#FFF" font-family="Georgia, serif" font-size="12" font-weight="bold">NEW</text>
  </g>

  <!-- Decorative wheat stalk -->
  <g transform="translate(300, 60)">
    <path d="M0 50 Q10 30 5 15 Q0 5 12 0" stroke="#C9A84C" stroke-width="2.5" fill="none"/>
    <ellipse cx="10" cy="8" rx="6" ry="12" fill="#D4A574" transform="rotate(-20 10 8)"/>
    <ellipse cx="5" cy="22" rx="5" ry="11" fill="#D4A574" transform="rotate(-30 5 22)"/>
    <ellipse cx="10" cy="38" rx="5" ry="10" fill="#D4A574" transform="rotate(-40 10 38)"/>
  </g>
</svg>
